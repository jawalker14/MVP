services:
  postgres:
    image: postgres:16
    container_name: invoicekasi_db
    environment:
      POSTGRES_DB: invoicekasi
      POSTGRES_USER: invoicekasi
      POSTGRES_PASSWORD: localdev
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U invoicekasi -d invoicekasi']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
